<!DOCTYPE html>
<html>
<head>
<title>EcoImpact Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(to right,#2e7d32,#66bb6a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-card{
background:white;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.login-card h2{
margin-bottom:20px;
color:#2e7d32;
}

.login-card input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

.login-card button{
width:100%;
padding:10px;
border:none;
background:#2e7d32;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.login-card button:hover{
opacity:0.9;
}

</style>

</head>

<body class="login-section">

<div class="login-card">

<h2>EcoImpact NGO 🌱</h2>

<input type="text" id="name" placeholder="Full Name (for register)">
<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<button onclick="register()" style="background:#66bb6a;margin-top:10px;">
Create Account
</button>

</div>

<script>

// ================= LOGIN =================

async function login(){

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

if(!email || !password){
alert("Please enter email and password");
return;
}

try{

const res = await fetch("/login",{   // ✅ FIXED

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({email,password})

});

const data = await res.json();

if(data.success){

localStorage.setItem("user", JSON.stringify(data.user));

if(data.user.role === "admin"){
window.location.href="admin.html";
}else{
window.location.href="dashboard.html";
}

}else{
alert(data.message || "Invalid login");
}

}catch(err){

alert("Server not reachable ❌");
console.log(err);

}

}


// ================= REGISTER =================

async function register(){

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

if(!name || !email || !password){
alert("Please fill all fields");
return;
}

try{

const res = await fetch("/register",{   // ✅ FIXED

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
email,
password,
role:"volunteer"
})

});

const data = await res.json();

alert(data.message);

}catch(err){

alert("Registration failed ❌");
console.log(err);

}

}

</script>

</body>
</html>
